name: Build Hook Binary

on:
  push:
    branches: [main]
    paths:
      - 'apps/hook/**'
      - '.github/workflows/build-hook.yml'
  pull_request:
    paths:
      - 'apps/hook/**'
      - '.github/workflows/build-hook.yml'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
            bun_target: bun-darwin-arm64
          - target: darwin-x64
            runner: macos-13
            bun_target: bun-darwin-x64
          - target: linux-x64
            runner: ubuntu-24.04
            bun_target: bun-linux-x64
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            bun_target: bun-linux-arm64

    runs-on: ${{ matrix.runner }}
    name: Build (${{ matrix.target }})

    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          mkdir -p apps/hook/dist
          bun build apps/hook/src/cli.ts \
            --compile \
            --target ${{ matrix.bun_target }} \
            --outfile apps/hook/dist/claude-telemetry-${{ matrix.target }}

      - name: Smoke test
        run: |
          chmod +x apps/hook/dist/claude-telemetry-${{ matrix.target }}
          apps/hook/dist/claude-telemetry-${{ matrix.target }} --version

      - name: Report binary size
        run: |
          ls -lh apps/hook/dist/claude-telemetry-${{ matrix.target }}

      - name: Codesign (Mac only)
        if: runner.os == 'macOS'
        run: bash apps/hook/scripts/codesign-mac.sh apps/hook/dist/claude-telemetry-${{ matrix.target }}
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: claude-telemetry-${{ matrix.target }}
          path: apps/hook/dist/claude-telemetry-${{ matrix.target }}
          retention-days: 30
