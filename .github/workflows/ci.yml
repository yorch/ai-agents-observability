name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      # keytar (a packages/auth dep) ships a prebuilt binary via prebuild-install,
      # but falls back to `node-gyp rebuild` when that download flakes — and the
      # source build needs libsecret's pkg-config headers, absent on the runner.
      # Install them so a prebuild-install timeout can't fail the whole job.
      - name: Install native build deps (keytar → libsecret)
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Lint
        run: bun run check

      - name: Test
        run: bun run test
