name: CI

on:
  push:
    branches: [main, 'claude/**', 'feat/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck / Lint / Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout@v4 — pinned to commit SHA for supply-chain hardening
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        # oven-sh/setup-bun@v2 — pinned to commit SHA
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: '1.3.13'

      - name: Setup Node.js
        # actions/setup-node@v4 — pinned to commit SHA (for Next.js prod runtime)
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '24.6.0'

      - name: Install dependencies
        # --frozen-lockfile fails the build if bun.lock is out of sync with package.json
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint + format check
        run: bun run check

      - name: Test
        run: bun run test
