name: CI

on:
  push:
    branches: [main, 'claude/**', 'feat/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck / Lint / Test
    runs-on: ubuntu-latest
    # The web build evaluates route modules during static analysis, which
    # reads env vars at the top level (see apps/web/src/lib/auth-provider.ts).
    # Provide non-empty placeholders so the build can proceed — real values
    # come from secrets at deploy time.
    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      GITHUB_OAUTH_CLIENT_ID: placeholder
      GITHUB_OAUTH_CLIENT_SECRET: placeholder
      GITHUB_HOST: github.com
    steps:
      - name: Checkout
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        # oven-sh/setup-bun@v2.2.0
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.13'

      - name: Setup Node.js
        # actions/setup-node@v6.4.0 (for Next.js prod runtime)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Install dependencies
        # --frozen-lockfile fails the build if bun.lock is out of sync with package.json
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint + format check
        run: bun run check

      - name: Test
        run: bun run test
