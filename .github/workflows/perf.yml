name: Hook Perf Benchmark

on:
  push:
    branches: [main, 'claude/**', 'feat/**', 'fix/**']
    paths:
      - 'apps/hook/**'
      - '.github/workflows/perf.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/hook/**'
      - '.github/workflows/perf.yml'
  # Allow manual trigger so baselines can be captured on demand.
  workflow_dispatch:

concurrency:
  group: perf-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hook-perf:
    name: Hook cold-start benchmark (<15ms p99)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        # actions/checkout@v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        # oven-sh/setup-bun@v2.2.0
        uses: oven-sh/setup-bun@v2c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build hook binary (linux-x64)
        run: |
          mkdir -p apps/hook/dist
          bun build apps/hook/src/cli.ts \
            --compile \
            --target bun-linux-x64 \
            --outfile apps/hook/dist/claude-telemetry

      - name: Run cold-start benchmark
        # PERF_COLD_ONLY=1   — skip warm-start (needs stdin patch, less meaningful in CI)
        # PERF_COLD_ITERATIONS=100 — 100 spawns per hook kind (400 total) keeps the job fast
        # Gate: exits 1 if any cold-start p99 > 15ms (10ms target + 50% CI headroom)
        #
        # If this job is consistently noisy on ubuntu-latest, add:
        #   continue-on-error: true
        # and document the baseline in apps/hook/bench/README.md.
        run: |
          PERF_COLD_ONLY=1 \
          PERF_COLD_ITERATIONS=100 \
          PERF_BINARY=apps/hook/dist/claude-telemetry \
          bun run --cwd apps/hook bench

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hook-bench-results-${{ github.sha }}
          path: apps/hook/bench/results/
          retention-days: 90
