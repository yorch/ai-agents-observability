services:
  migrations:
    build:
      context: .
      dockerfile: infra/migrations-runner/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_agents_observability}
    restart: "no"

  github-app:
    build:
      context: .
      dockerfile: apps/github-app/Dockerfile
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_agents_observability}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_APP_WEBHOOK_SECRET: ${GITHUB_APP_WEBHOOK_SECRET:-}
      GITHUB_HOST: ${GITHUB_HOST:-https://github.com}
      GITHUB_APP_PORT: ${GITHUB_APP_PORT:-4001}
      PORT: 4001
      HOSTNAME: 0.0.0.0
      GIT_SHA: ${GIT_SHA:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "${GITHUB_APP_PORT:-4001}:4001"
    profiles: ["pr-loop"]
    restart: unless-stopped

  ingest:
    build:
      context: .
      dockerfile: apps/ingest/Dockerfile
      target: build
    init: true
    command: bun run --watch apps/ingest/src/index.ts
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_agents_observability}
      GIT_SHA: ${GIT_SHA:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      NODE_ENV: development
      PORT: 4000
      HOSTNAME: 0.0.0.0
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-transcripts}
      S3_ENDPOINT: http://minio:9000
      S3_FORCE_PATH_STYLE: "true"
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${INGEST_PORT:-4000}:4000"
    volumes:
      - ./apps/ingest/src:/app/apps/ingest/src:ro
      - ./packages:/app/packages:ro
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: build
    init: true
    command: bunx next dev --port 3000
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_agents_observability}
      GITHUB_HOST: ${GITHUB_HOST:-github.com}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      JWT_ED25519_PRIVATE_KEY: ${JWT_ED25519_PRIVATE_KEY:-}
      JWT_ED25519_PUBLIC_KEY: ${JWT_ED25519_PUBLIC_KEY:-}
      NEXT_PUBLIC_INGEST_URL: ${NEXT_PUBLIC_INGEST_URL:-http://localhost:4000}
      NODE_ENV: development
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./apps/web/src:/app/apps/web/src:ro
      - ./packages:/app/packages:ro
    working_dir: /app/apps/web
    restart: unless-stopped
