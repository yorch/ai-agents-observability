# Prod app services. Run layered on top of the infra stack, which provides
# postgres + minio:
#   docker compose -f docker-compose.infra.yml -f docker-compose.prod.yml up -d
#
# Connection URLs are set HERE (not inherited from .env) so the bundled stack
# works out of the box: the .env localhost values are for the native-host dev
# workflow and resolve to the container itself in prod. Point at a managed DB
# or external S3 by setting the *_OVERRIDE vars (see .env.example).
services:
  web:
    image: ${APP_IMAGE_WEB:-ghcr.io/yorch/ai-agents-observability/web:main}
    pull_policy: always
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL_OVERRIDE:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_agents_observability}}

  ingest:
    image: ${APP_IMAGE_INGEST:-ghcr.io/yorch/ai-agents-observability/ingest:main}
    pull_policy: always
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    ports:
      - ${INGEST_PORT:-4000}:4000
    env_file:
      - .env
    environment:
      PORT: "4000"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL_OVERRIDE:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_agents_observability}}
      # Defaults target the bundled MinIO; set the *_OVERRIDE vars to point at
      # external S3 (real AWS, Backblaze B2, etc.).
      S3_ENDPOINT: ${S3_ENDPOINT_OVERRIDE:-http://minio:9000}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID_OVERRIDE:-${MINIO_ROOT_USER:-minioadmin}}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY_OVERRIDE:-${MINIO_ROOT_PASSWORD:-minioadmin}}
      S3_BUCKET: ${S3_BUCKET:-transcripts}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}

  github-app:
    image: ${APP_IMAGE_GITHUB:-ghcr.io/yorch/ai-agents-observability/github-app:main}
    pull_policy: always
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    ports:
      - ${GITHUB_APP_PORT:-4001}:4001
    env_file:
      - .env
    environment:
      PORT: "4001"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL_OVERRIDE:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_agents_observability}}

  migrations:
    image: ${APP_IMAGE_MIGRATIONS:-ghcr.io/yorch/ai-agents-observability/migrations-runner:main}
    pull_policy: always
    build: !reset null
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL_OVERRIDE:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_agents_observability}}
