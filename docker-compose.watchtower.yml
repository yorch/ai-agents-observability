services:
  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_SCOPE: ${WATCHTOWER_SCOPE:-ai-agents-observability}
      WATCHTOWER_CLEANUP: "true"
      # Default daily, matching .env.example documentation.
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_POLL_INTERVAL:-86400}

  web:
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=${WATCHTOWER_SCOPE:-ai-agents-observability}"

  ingest:
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=${WATCHTOWER_SCOPE:-ai-agents-observability}"

  github-app:
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=${WATCHTOWER_SCOPE:-ai-agents-observability}"
