services:
  ingest:
    build:
      context: ..
      dockerfile: apps/ingest/Dockerfile
      target: build
    command: bun run --watch apps/ingest/src/index.ts
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_agents_observability}
      GIT_SHA: ${GIT_SHA:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      NODE_ENV: development
      PORT: ${INGEST_PORT:-4000}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-transcripts}
      S3_ENDPOINT: http://minio:9000
      S3_FORCE_PATH_STYLE: "true"
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${INGEST_PORT:-4000}:4000"
    volumes:
      - ../apps/ingest/src:/app/apps/ingest/src:ro
      - ../packages:/app/packages:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped
