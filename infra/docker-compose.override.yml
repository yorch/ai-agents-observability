services:
  ingest:
    build:
      context: ..
      dockerfile: apps/ingest/Dockerfile
      target: build
    init: true
    command: bun run --watch apps/ingest/src/index.ts
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_agents_observability}
      GIT_SHA: ${GIT_SHA:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      NODE_ENV: development
      PORT: ${INGEST_PORT:-4000}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-transcripts}
      S3_ENDPOINT: http://minio:9000
      S3_FORCE_PATH_STYLE: "true"
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${INGEST_PORT:-4000}:4000"
    volumes:
      - ../apps/ingest/src:/app/apps/ingest/src:ro
      - ../packages:/app/packages:ro
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:4000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 6
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      target: build
    init: true
    command: bunx next dev --port 3000
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_agents_observability}
      GITHUB_HOST: ${GITHUB_HOST:-github.com}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      JWT_ED25519_PRIVATE_KEY: ${JWT_ED25519_PRIVATE_KEY:-}
      JWT_ED25519_PUBLIC_KEY: ${JWT_ED25519_PUBLIC_KEY:-}
      NEXT_PUBLIC_INGEST_URL: ${NEXT_PUBLIC_INGEST_URL:-http://localhost:4000}
      NODE_ENV: development
      PORT: 3000
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ../apps/web/src:/app/apps/web/src:ro
      - ../packages:/app/packages:ro
    working_dir: /app/apps/web
    restart: unless-stopped
