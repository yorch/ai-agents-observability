global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ingest
    static_configs:
      - targets: ['host.docker.internal:4000']
    metrics_path: /metrics

  - job_name: github-app
    static_configs:
      - targets: ['host.docker.internal:4001']
    metrics_path: /metrics

  - job_name: web
    static_configs:
      - targets: ['host.docker.internal:3000']
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
